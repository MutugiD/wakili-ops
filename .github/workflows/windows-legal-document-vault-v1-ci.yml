name: Windows Legal Document Vault V1 CI

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - "windows-legal-document-vault/v1/**"
      - ".github/workflows/windows-legal-document-vault-v1-ci.yml"
      - ".gitleaks.toml"
  pull_request:
    branches:
      - main
      - master
      - dev
    paths:
      - "windows-legal-document-vault/v1/**"
      - ".github/workflows/windows-legal-document-vault-v1-ci.yml"
      - ".gitleaks.toml"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Leak Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.28.0 \
            detect \
            --source=/repo \
            --config=/repo/.gitleaks.toml \
            --redact \
            --no-banner \
            --verbose

  build-test-security:
    name: Build, Test, and Security Gates
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh
        working-directory: windows-legal-document-vault/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Show .NET info
        run: dotnet --info

      - name: Validate product/version structure
        working-directory: .
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci/Assert-ProductStructure.ps1

      - name: Validate markdown links
        working-directory: .
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci/Test-MarkdownLinks.ps1

      - name: Reject legacy numbered product labels
        working-directory: .
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/ci/Test-NoLegacySolutionLabels.ps1

      - name: Restore
        run: dotnet restore WakiliDms.sln

      - name: Code style check
        run: dotnet format WakiliDms.sln --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build WakiliDms.sln --configuration Release --no-restore

      - name: Run functional and security test harness
        run: dotnet run --configuration Release --project tests/WakiliDms.Tests/WakiliDms.Tests.csproj --no-build

      - name: Dependency vulnerability scan
        run: dotnet list WakiliDms.sln package --include-transitive --vulnerable

      - name: App startup smoke
        run: |
          $project = Join-Path (Get-Location) "src\WakiliDms.App\WakiliDms.App.csproj"
          $proc = Start-Process -FilePath "dotnet" -ArgumentList @("run","--configuration","Release","--project",$project,"--no-build") -WindowStyle Hidden -PassThru
          Start-Sleep -Seconds 8
          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force
            "PASS App startup smoke"
          } else {
            throw "App exited early with code $($proc.ExitCode)"
          }
