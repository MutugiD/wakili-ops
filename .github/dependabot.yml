version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/windows-legal-document-vault/v1"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"

